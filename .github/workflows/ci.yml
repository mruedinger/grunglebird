name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      # Fail if the committed Worker types drifted from what `wrangler types`
      # produces (e.g. a wrangler bump that ships a newer workerd). Dependabot
      # won't regenerate them, so this guard catches the staleness here instead
      # of letting it surface on an unrelated PR.
      - name: Worker types in sync
        run: |
          npm run generate-types
          git diff --exit-code worker-configuration.d.ts \
            || { echo "::error::worker-configuration.d.ts is stale — run 'npm run generate-types' and commit the result."; exit 1; }
      - run: npm run lint:styles
      - run: npm run check
      - run: npm run build

  # Single stable status check that branch protection requires. Add future
  # checks as steps in the `ci` job above, or as sibling jobs listed in `needs`
  # here — either way this gate covers them and branch protection never changes.
  required-checks:
    name: Required checks
    if: always()
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required jobs passed
        run: |
          for result in ${{ join(needs.*.result, ' ') }}; do
            if [ "$result" != "success" ]; then
              echo "A required job did not pass (result: $result)."
              exit 1
            fi
          done
