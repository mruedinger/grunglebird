name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run build

  # Single stable status check that branch protection requires. Add future
  # checks as steps in the `ci` job above, or as sibling jobs listed in `needs`
  # here — either way this gate covers them and branch protection never changes.
  required-checks:
    name: Required checks
    if: always()
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required jobs passed
        run: |
          for result in ${{ join(needs.*.result, ' ') }}; do
            if [ "$result" != "success" ]; then
              echo "A required job did not pass (result: $result)."
              exit 1
            fi
          done
